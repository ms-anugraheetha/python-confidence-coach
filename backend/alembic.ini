# alembic.ini — Alembic configuration file.
#
# WHY THIS FILE EXISTS:
#   Alembic reads this to know:
#     1. Where the migration scripts live (script_location)
#     2. How to format revision IDs (rev_id_length)
#     3. Logging setup (so migration output is readable)
#
# The DATABASE URL is intentionally NOT set here.
# We set it in env.py from our Settings singleton so secrets stay in .env,
# not committed to git in a config file.

[alembic]
script_location = alembic

# How long the auto-generated revision ID is (hexadecimal).
# 12 chars = 48 bits of entropy, collision-resistant for any project size.
rev_id_length = 12

# File template for new migrations (YYYY-MM-DD prefix for readable git history)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# ── Logging ───────────────────────────────────────────────────────────────────
# Minimal logging config so `alembic upgrade head` prints readable output.
# Our app's structlog config is NOT loaded during migrations — too heavy.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

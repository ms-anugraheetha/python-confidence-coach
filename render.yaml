# render.yaml — Infrastructure-as-code for Render.com
#
# This file defines three resources:
#   1. coach-mcp      — MCP server  (Web Service, port 8001)
#   2. coach-backend  — FastAPI app (Web Service, port 8000)
#   3. coach-db       — Managed PostgreSQL 16
#
# DEPLOY STEPS:
#   1. Push your repo to GitHub / GitLab
#   2. In Render Dashboard → "New" → "Blueprint" → connect your repo
#   3. Render reads this file and creates all three services automatically
#   4. Set the secret env vars in the Render dashboard (marked fromDatabase
#      or sync: false below)
#
# IMPORTANT AFTER FIRST DEPLOY:
#   Run the Alembic migration once to create tables:
#     Render Dashboard → coach-backend → Shell → alembic upgrade head

services:
  # ── MCP Server ──────────────────────────────────────────────────────────────
  - type: web
    name: coach-mcp
    runtime: docker
    dockerfilePath: ./mcp-server/Dockerfile
    dockerContext: ./mcp-server
    plan: free                  # upgrade to starter for always-on
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false             # set manually in Render dashboard
      - key: MCP_HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: MCP_PORT
        value: "10000"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: coach-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Database — Render auto-populates this from the managed DB below
      - key: DATABASE_URL
        fromDatabase:
          name: coach-db
          property: connectionString

      # Secrets — set these manually in the Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # MCP server internal URL — replace YOUR_MCP_SERVICE_URL after first deploy.
      # Pattern: https://coach-mcp.onrender.com/mcp
      - key: MCP_SERVER_URL
        sync: false

      # Frontend URL — replace after Vercel deploy
      # Pattern: ["https://your-app.vercel.app"]
      - key: CORS_ORIGINS
        sync: false

      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ── Managed PostgreSQL ───────────────────────────────────────────────────────
databases:
  - name: coach-db
    databaseName: confidence_coach
    user: coach
    plan: free
    postgresMajorVersion: "16"
